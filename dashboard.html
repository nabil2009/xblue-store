<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xBlue Pro Dashboard - لوحة التحكم المتقدمة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* تنسيق اللوجو المحدث */
        .nav-logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .nav-logo-container img {
            width: 120px;
            height: auto;
            max-height: 55px;
            object-fit: contain;
        }
        .nav-logo-container span {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }

        /* نظام الإشعارات */
        .announcement-overlay { 
            position: fixed; 
            top: 25px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 9999; 
            width: 90%; 
            max-width: 550px; 
            display: none; 
            animation: annSlideIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); 
        }
        @keyframes annSlideIn { from { transform: translate(-50%, -100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        .ann-content { 
            padding: 18px 25px; 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            position: relative;
        }

        .ann-permanent {
            border: 2px solid #ffcc00 !important;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
            background: linear-gradient(135deg, #2c3e50, #000000) !important;
        }
        .ann-permanent::before {
            content: "إعلان مثبت 📌";
            position: absolute;
            top: -10px;
            right: 20px;
            background: #ffcc00;
            color: black;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        .type-info { background: linear-gradient(135deg, #5865F2, #4752C4); }
        .type-success { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .type-warning { background: linear-gradient(135deg, #f39c12, #d35400); }
        .type-danger { background: linear-gradient(135deg, #ed4245, #c0392b); }

        .project-stats { display: flex; gap: 15px; margin: 10px 0; font-size: 12px; color: #aaa; }
        .stat-item { display: flex; align-items: center; gap: 5px; }
        .tag-pill { background: rgba(88, 101, 242, 0.1); color: #5865F2; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .requirements-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin: 10px 0; font-size: 12px; border-right: 3px solid #5865F2; }
        .btn-download { background: linear-gradient(45deg, #5865F2, #7289da); color: white !important; padding: 12px 20px; border-radius: 50px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 800; transition: 0.3s; flex: 1; }
        .admin-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 25px; }
        @media (max-width: 992px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="announcementOverlay" class="announcement-overlay">
    <div id="annBox" class="ann-content">
        <div id="annIcon" style="font-size: 22px;"><i class="fas fa-bullhorn"></i></div>
        <div id="annText" style="flex-grow: 1; font-weight: 600;"></div>
        <div id="annCloseBtn" class="ann-close" onclick="closeAnnouncement()" style="cursor:pointer; display:none;"><i class="fas fa-times"></i></div>
    </div>
</div>

<nav class="navbar">
    <div class="nav-logo-container">
        <img src="logopff.png" alt="xBlue Logo">
        <span>xBlue Studio</span>
    </div>

    <div style="display: flex; align-items: center; gap: 20px;">
        <div id="userInfo" class="user-pill"></div>
        <button onclick="logout()" class="btn-danger" style="border-radius: 12px; padding: 10px 15px;">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</nav>

<div class="container">
    <div id="adminSection" class="admin-panel" style="display: none;">
        <h2 style="margin-bottom: 30px;"><i class="fas fa-user-shield"></i> لوحة الإدارة المتقدمة</h2>
        <div class="admin-grid">
            <div class="admin-card">
                <h3 style="margin-top: 0;"><i class="fas fa-plus-circle"></i> نشر مشروع تقني</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group"><label>اسم المشروع</label><input type="text" id="pName" placeholder="Discord Bot"></div>
                    <div class="input-group"><label>الإصدار</label><input type="text" id="pVersion" placeholder="V1.0.0"></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group"><label>اللغة / الوسم</label>
                        <select id="pTag">
                            <option value="JavaScript">JavaScript</option>
                            <option value="Python">Python</option>
                            <option value="HTML/CSS">HTML/CSS</option>
                        </select>
                    </div>
                    <div class="input-group"><label>نوع الوصول</label>
                        <select id="pIsPremium"><option value="false">عام</option><option value="true">خاص 👑</option></select>
                    </div>
                </div>
                <div class="input-group"><label>رابط الصورة</label><input type="text" id="pImg"></div>
                <div class="input-group"><label>رابط التحميل</label><input type="text" id="pLink"></div>
                <div class="input-group"><label>المتطلبات</label><input type="text" id="pReq"></div>
                <div class="input-group"><label>سجل التحديثات</label><input type="text" id="pChangelog"></div>
                <div class="input-group"><label>وصف المشروع</label><textarea id="pDesc" rows="2"></textarea></div>
                <button onclick="addProject()" class="btn-main" style="width:100%; padding: 15px;"><i class="fas fa-rocket"></i> إطلاق المشروع </button>
            </div>

            <div class="admin-card" style="border-color: #5865F2;">
                <h3><i class="fas fa-bullhorn"></i> التحكم بالإعلانات</h3>
                <div class="input-group"><label>نص الرسالة</label><input type="text" id="noteText"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="input-group"><label>النوع</label>
                        <select id="annType">
                            <option value="type-info">تنويه</option>
                            <option value="type-success">ترحيب</option>
                            <option value="type-danger">تنبيه</option>
                        </select>
                    </div>
                    <div class="input-group"><label>المدة</label>
                        <select id="annDuration">
                            <option value="5000">5 ثوانٍ</option>
                            <option value="0">دائم (مثبت)</option>
                        </select>
                    </div>
                </div>
                <button onclick="broadcastAnnouncement()" class="btn-main" style="width:100%; background: #5865F2; margin-bottom: 10px;">بث الإعلان</button>
                <button onclick="removeAnnouncement()" class="btn-danger" style="width:100%; border-radius: 8px;"><i class="fas fa-eraser"></i> إزالة الإعلان الحالي</button>
            </div>
        </div>
    </div>

    <h2 class="tab-title"><i class="fas fa-code"></i> المكتبة البرمجية</h2>
    <div id="publicGrid" class="grid"></div>

    <h2 class="tab-title"><i class="fas fa-crown" style="color: #ffcc00;"></i> الخزنة الحصرية</h2>
    <div id="premiumGrid" class="grid"></div>
</div>

<script>
    const SUPABASE_URL = 'https://pqhdidvxjdjccknlwzit.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_TJ4QJng8C74CeR8L0kh-vA_fDmV40rS'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const MY_DISCORD_ID = '1191367983466033252'; 
    const SERVER_ID = '1269271668250116136'; 
    const PREMIUM_ROLE_ID = '1369345035514155071';
    const DOMAIN_URL = 'https://xbluestudio.qzz.io';

    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.href = 'index.html'; return; }
        
        const isAdmin = String(session.user.user_metadata.provider_id) === MY_DISCORD_ID;
        const hasPremium = await checkDiscordRole(session.provider_token);
        
        document.getElementById('userInfo').innerHTML = `
            <img src="${session.user.user_metadata.avatar_url}" style="width:30px; border-radius:50%;"> 
            <span>${session.user.user_metadata.full_name}</span>
        `;
        
        if (isAdmin) {
            document.getElementById('adminSection').style.display = 'block';
        }
        
        loadProjects(isAdmin, hasPremium);
    }

    async function checkDiscordRole(token) {
        try {
            const res = await fetch(`https://discord.com/api/users/@me/guilds/${SERVER_ID}/member`, { 
                headers: { Authorization: `Bearer ${token}` } 
            });
            const data = await res.json();
            return data.roles && data.roles.includes(PREMIUM_ROLE_ID);
        } catch (e) { return false; }
    }

    async function addProject() {
        const pData = {
            name: document.getElementById('pName').value,
            version: document.getElementById('pVersion').value,
            image_url: document.getElementById('pImg').value,
            link: document.getElementById('pLink').value,
            description: document.getElementById('pDesc').value,
            tag: document.getElementById('pTag').value || 'General',
            requirements: document.getElementById('pReq').value,
            changelog: document.getElementById('pChangelog').value,
            is_premium: document.getElementById('pIsPremium').value === 'true',
            downloads: 0,
            views: 0
        };

        if(!pData.name || !pData.link) return alert("الاسم والرابط مطلوبان!");

        try {
            const { data, error } = await supabaseClient
                .from('projects')
                .insert([pData]);

            if (error) throw error;

            alert("تم النشر بنجاح! 🚀");
            location.reload();
        } catch (err) {
            alert("فشل النشر: " + err.message);
        }
    }

    async function loadProjects(isAdmin, hasPremium) {
        const { data: projects, error } = await supabaseClient
            .from('projects')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return;

        const pGrid = document.getElementById('publicGrid');
        const prGrid = document.getElementById('premiumGrid');
        
        pGrid.innerHTML = '';
        prGrid.innerHTML = '';

        projects.forEach(p => {
            const cardHTML = `
                <div class="card">
                    <div class="card-img-wrapper"><img src="${p.image_url || 'https://via.placeholder.com/320'}"></div>
                    <div class="card-body">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="tag-pill">${p.tag || 'عام'}</span>
                        </div>
                        <h3>${p.name} <small style="font-size:10px; color:#666;">${p.version}</small></h3>
                        <div class="project-stats">
                            <div class="stat-item"><i class="fas fa-download"></i> ${p.downloads || 0}</div>
                            <div class="stat-item"><i class="fas fa-eye"></i> ${p.views || 0}</div>
                        </div>
                        <div class="requirements-box"><strong>المتطلبات:</strong> ${p.requirements || 'لا يوجد'}</div>
                        <p style="font-size:12px; color:#aaa;">${p.description || ''}</p>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <a href="${p.link}" target="_blank" onclick="updateDownloads(${p.id})" class="btn-download"><i class="fas fa-download"></i> تحميل</a>
                            ${isAdmin ? `<button onclick="deleteProject(${p.id})" class="btn-danger" style="width:45px; border-radius:50%; flex:none;"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                </div>`;

            if (p.is_premium) {
                if (hasPremium || isAdmin) prGrid.innerHTML += cardHTML;
            } else {
                pGrid.innerHTML += cardHTML;
            }
        });
    }

    async function deleteProject(id) { 
        if(confirm('هل أنت متأكد من حذف هذا المشروع نهائياً؟')) { 
            try {
                const { error } = await supabaseClient
                    .from('projects')
                    .delete()
                    .eq('id', id); 

                if (error) throw error;
                alert("تم حذف المشروع ✅");
                location.reload(); 
            } catch (err) {
                alert("خطأ: " + err.message);
            }
        }
    }

    async function logout() { 
        await supabaseClient.auth.signOut(); 
        window.location.href = 'index.html'; 
    }

    // تشغيل التحقق عند التحميل
    checkAuth();
</script>
</body>
</html>
